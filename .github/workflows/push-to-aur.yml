name: Push to AUR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "PKGBUILD"
      - ".SRCINFO"

jobs:
  push-to-aur:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup SSH for AUR
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          KEY="${{ secrets.AUR_SSH_KEY }}"
          if printf '%s' "$KEY" | grep -q '\\n'; then
            printf '%b' "$KEY" | tr -d '\r' > ~/.ssh/aur
          else
            printf '%s' "$KEY" | tr -d '\r' > ~/.ssh/aur
          fi
          chmod 600 ~/.ssh/aur
          ssh-keygen -y -f ~/.ssh/aur >/dev/null
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts

          cat > ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            User aur
          EOF

      - name: Configure Git
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to AUR
        run: |
          set -euo pipefail
          git clone ssh://aur@aur.archlinux.org/panache-bin.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git add PKGBUILD .SRCINFO

          if git diff --staged --quiet; then
            echo "No changes to push"
          else
            git commit -m "Update to $(grep '^pkgver=' PKGBUILD | cut -d= -f2)"
            git push
            echo "Successfully pushed to AUR"
          fi
