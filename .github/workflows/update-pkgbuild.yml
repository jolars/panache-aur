name: Update PKGBUILD

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to update to (leave empty for latest)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  update-pkgbuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Get release info
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Get version from input, client_payload, or fetch latest from GitHub
          if [ -n "${{ github.event.inputs.version }}" ]; then
            RAW="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.client_payload.version }}" ]; then
            RAW="${{ github.event.client_payload.version }}"
          else
            RAW=""
          fi

          if [ -n "${RAW:-}" ]; then
            if [[ "$RAW" =~ ^(panache-v|v)[0-9] ]]; then
              TAG="$RAW"
              VERSION="${RAW#panache-v}"
              VERSION="${VERSION#v}"
            else
              VERSION="$RAW"
              TAG=""
              for CANDIDATE in "panache-v$VERSION" "v$VERSION"; do
                if gh api "repos/jolars/panache/releases/tags/$CANDIDATE" --jq '
                  (.assets | map(.name) | index("panache-x86_64-unknown-linux-gnu.tar.gz")) != null and
                  (.assets | map(.name) | index("panache-aarch64-unknown-linux-gnu.tar.gz")) != null
                ' 2>/dev/null | grep -qx 'true'; then
                  TAG="$CANDIDATE"
                  break
                fi
              done
              [ -n "$TAG" ] || { echo "Could not resolve release tag from version '$VERSION'"; exit 1; }
            fi
          else
            # Fetch latest non-prerelease main panache release (not parser/etc) by required assets.
            TAG=$(gh api "repos/jolars/panache/releases?per_page=100" --jq '
              [ .[]
                | select((.draft | not) and (.prerelease | not))
                | select((.tag_name | startswith("v")) or (.tag_name | startswith("panache-v")))
                | select((.assets | map(.name) | index("panache-x86_64-unknown-linux-gnu.tar.gz")) != null)
                | select((.assets | map(.name) | index("panache-aarch64-unknown-linux-gnu.tar.gz")) != null)
                | .tag_name
              ][0] // empty
            ')
            [ -n "$TAG" ] || { echo "Failed to determine latest panache release tag"; exit 1; }
            VERSION="${TAG#panache-v}"
            VERSION="${VERSION#v}"
            echo "Fetched latest version: $VERSION (tag: $TAG)"
          fi

          case "$TAG" in
            panache-v*) TAG_PREFIX="panache-v" ;;
            v*) TAG_PREFIX="v" ;;
            *) echo "Unsupported release tag format: $TAG"; exit 1 ;;
          esac

          [ -n "$VERSION" ] || { echo "Failed to determine release version"; exit 1; }

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "tag_prefix=$TAG_PREFIX" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Download binary tarballs and compute checksums
          curl -fsSL -o panache-x86_64-unknown-linux-gnu.tar.gz "https://github.com/jolars/panache/releases/download/$TAG/panache-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL -o panache-aarch64-unknown-linux-gnu.tar.gz "https://github.com/jolars/panache/releases/download/$TAG/panache-aarch64-unknown-linux-gnu.tar.gz"

          SHA256_X64=$(sha256sum panache-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA256_ARM64=$(sha256sum panache-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')

          echo "sha256_x64=$SHA256_X64" >> $GITHUB_OUTPUT
          echo "sha256_arm64=$SHA256_ARM64" >> $GITHUB_OUTPUT

          echo "Downloaded $TAG binaries"
          echo "SHA256 x86_64: $SHA256_X64"
          echo "SHA256 aarch64: $SHA256_ARM64"

      - name: Determine pkgrel
        id: pkgrel
        run: |
          # Clone AUR repo to check current version
          git clone https://aur.archlinux.org/panache-bin.git aur-temp || true

          PKGREL=1
          if [ -f aur-temp/PKGBUILD ]; then
            AUR_PKGVER=$(grep '^pkgver=' aur-temp/PKGBUILD | cut -d= -f2)
            AUR_PKGREL=$(grep '^pkgrel=' aur-temp/PKGBUILD | cut -d= -f2)
            NEW_PKGVER="${{ steps.release.outputs.version }}"

            if [ "$NEW_PKGVER" = "$AUR_PKGVER" ]; then
              # Same version, increment pkgrel
              PKGREL=$((AUR_PKGREL + 1))
              echo "Same version detected, incrementing pkgrel to $PKGREL"
            else
              echo "New version detected, using pkgrel=1"
            fi
          fi

          echo "pkgrel=$PKGREL" >> $GITHUB_OUTPUT
          rm -rf aur-temp

      - name: Update PKGBUILD
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.release.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${{ steps.pkgrel.outputs.pkgrel }}/" PKGBUILD
          sed -i "s|^source_x86_64=.*|source_x86_64=(\"panache-\$pkgver-x86_64-unknown-linux-gnu.tar.gz::\$url/releases/download/${{ steps.release.outputs.tag_prefix }}\$pkgver/panache-x86_64-unknown-linux-gnu.tar.gz\")|" PKGBUILD
          sed -i "s|^source_aarch64=.*|source_aarch64=(\"panache-\$pkgver-aarch64-unknown-linux-gnu.tar.gz::\$url/releases/download/${{ steps.release.outputs.tag_prefix }}\$pkgver/panache-aarch64-unknown-linux-gnu.tar.gz\")|" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${{ steps.release.outputs.sha256_x64 }}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${{ steps.release.outputs.sha256_arm64 }}')/" PKGBUILD

      - name: Test build package
        run: |
          # Extract tarballs for testing
          mkdir -p test-build
          cd test-build
          tar -xzf ../panache-x86_64-unknown-linux-gnu.tar.gz

          # Verify expected files exist
          test -f panache || (echo "Binary not found" && exit 1)
          test -f LICENSE || (echo "LICENSE not found" && exit 1)
          test -d man || (echo "man directory not found" && exit 1)
          test -d completions || (echo "completions directory not found" && exit 1)

          echo "✓ All expected files present in tarball"

      - name: Install makepkg
        run: |
          sudo apt-get update
          sudo apt-get install -y pacman-package-manager

      - name: Generate .SRCINFO
        run: makepkg --printsrcinfo > .SRCINFO

      - name: Validate and build package
        uses: edlanglois/pkgbuild-action@v1

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ github.token }}
          add-paths: |
            PKGBUILD
            .SRCINFO
          commit-message: "chore: update to ${{ steps.release.outputs.tag }}"
          title: "Update to ${{ steps.release.outputs.tag }}"
          body: |
            Updates PKGBUILD for panache-bin ${{ steps.release.outputs.tag }}

            **Release**: https://github.com/jolars/panache/releases/tag/${{ steps.release.outputs.tag }}

            **Changes:**
            - pkgver: ${{ steps.release.outputs.version }}
            - pkgrel: ${{ steps.pkgrel.outputs.pkgrel }}
            - sha256sum (x86_64): `${{ steps.release.outputs.sha256_x64 }}`
            - sha256sum (aarch64): `${{ steps.release.outputs.sha256_arm64 }}`

            ---

            **Testing checklist before merging:**
            - [ ] Review PKGBUILD changes
            - [ ] Verify checksums match GitHub release
            - [ ] Will auto-push to AUR after merge
          branch: "update-${{ steps.release.outputs.tag }}"
          delete-branch: true
